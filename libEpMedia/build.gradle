apply plugin: 'com.android.library'

android {
    namespace "jnicode.jni"
    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 21
        externalNativeBuild {
            cmake {
                cppFlags ""
            }
        }

        ndk {
            abiFilters  "armeabi-v7a"
            //abiFilters  "arm64-v8a"
        }

    }

    externalNativeBuild {
        cmake {
            path file('jnicode/jni/CMakeLists.txt')
        }
    }
}
